    <style>
        /* Estética Dark Mode - Inspirado en Arch Linux */
        body {
            background-color: #0d0d0d;
            color: #00ff41; /* Verde Matrix/Terminal */
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }
        /*Contenedor de Texto*/
        #ui-header {
            flex-shrink: 0;
            padding: 10px;
            text-align: center;
        }
        /*Cartel de Informacion*/
        #info-panel {
            display: inline-block;
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 1rem;
            min-width: 200px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: border-color 0.2s ease;
            width: 32ch;
            box-sizing: border-box;
            white-space: nowrap;
        }
        /*Tamaño de la placa*/
        #contenedor-placa {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 5px;
            box-sizing: border-box;
            min-height: 0;
            width: 100%;
        }

        svg {
            max-width: 100%;
            max-height: 100%;
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            filter: drop-shadow(0 0 20px rgba(0,255,65,0.1));
            transition: all 0.2s ease-out;
        }

        /* Interacción con los componentes */
        circle, rect, path {
            pointer-events: all;
            filter: drop-shadow(0 0 0.2px rgba(0, 255, 65, 0));
            fill-opacity: 1;

            transition: filter 0.5s ease-out,
                        stroke 0.5s ease-out,
                        fill-opacity 0.5s ease-out,
                        stroke-width 0.5s ease-out;
        }

        /* Efecto de Hover: Brillo verde neón */
        circle:hover, #Visual_MCU:hover, #Visual_SD_Slot:hover, #Visual_USB:hover {
            cursor: pointer;
            stroke: #00ff41 !important;
            stroke-width: 0.4px;
            filter: drop-shadow(0 0 8px #00ff41);
            fill-opacity: 0.8;
        }
        /*Texto del Cartel*/
        .highlight-text {
            color: #fff;
            text-shadow: 0 0 5px #00ff41;
        }
        /*Ignorar Elementos*/
        
        [id*="Silkscreen"] {
            pointer-events: none;
        }
        [id*="Body"]{
            pointer-events: none;
        }

    /*Cajita Mouse*/
    .tooltip {
        position: fixed;
        background: rgba(26,26,26,0.95);
        color: #00ff41;
        padding: 10px 15px;
        border: 1px solid #00ff41;
        border-radius: 4px;
        font-size: 0.9rem;
        pointer-events: none;
        display: none;
        z-index: 9999;
        box-shadow: 0 0 15px rgba(0,255,65,0.2);
        white-space: normal;
        text-align: center;
        width: max-content;
        max-width: 250px;
        min-width: 80px;
        padding: 8px 12px;
        line-height: 1.4;
        transition: none;
        margin: 0;
    }

    </style>

    <script>
        
        const infoPines = infoPinesData; 
        const infoPanel = document.getElementById('info-panel');
        const svg = document.querySelector('svg');
        const tooltip = document.getElementById('tooltip');
        
        //Seguimiento del Mouse
        document.addEventListener('mousemove', (e) => {
            if (tooltip.style.display === 'block') {
                const mouseX = e.clientX;
                const mouseY = e.clientY;
                const rect = tooltip.getBoundingClientRect();
                const gap = 12;
                let finalX, finalY; 
            
                //Lógica del Movimiento en X
               if (tooltip.classList.contains('lado-izquierdo')) {
                finalX = mouseX - rect.width - gap;
               } else {
                finalX = mouseX + gap;
               }

               if (finalX < 10) {
                finalX = mouseX + gap;
               } else if (finalX + rect.width > window.innerWidth - 10) {
                finalX = mouseX - rect.width - gap;
               }

               //Lógica del Movimiento en Y
               finalY = mouseY - rect.height - gap;

               const headerRect = infoPanel.getBoundingClientRect();
               const limiteSuperior = headerRect.bottom + 8;

               if (finalY < limiteSuperior) {
                finalY = mouseY + gap;
               } else if (finalY + rect.height > window.innerHeight - 10) {
                finalY = mouseY - rect.height - gap;
               }

               tooltip.style.left = finalX + 'px';
               tooltip.style.top = finalY + 'px';
            }
            
        });

        // Escuchamos el movimiento del mouse sobre el SVG
        svg.addEventListener('mouseover', (e) => {
            const target = e.target;
            
            //Filtramos para que solo actúe en componenetes con ID real
            if (target.id && !['svg1', 'Placa'].includes(target.id)){
               
            const partes = target.id.split('_');
            const prefijo = partes[0]; //LE, LI, RE o RI


            //Filtrado de Nombres
            const palabrasProhibidas = ['LE', 'LI', 'RI', 'RE', 'TOP', 'MID', 'Cap', 'Body', 'Visual', '1', '2'];
            const filtradas = partes.filter(p => !palabrasProhibidas.includes(p));
            const nombreParaMostrar = filtradas.join(' ');
            const descripcion = infoPines[nombreParaMostrar] || "Pin sin descripción cargada"; //Logica de Busqueda

            //Logica de Direccion
            if (prefijo === 'LE' || prefijo === 'RI') {
                tooltip.classList.add('lado-izquierdo');
                tooltip.classList.remove('lado-derecho');
            } else {
                tooltip.classList.add('lado-derecho');
                tooltip.classList.remove('lado-izquierdo');
            }

            //tooltip
            tooltip.innerHTML = `<strong>${nombreParaMostrar}</strong><br><small>${descripcion}</small>`;
            tooltip.style.display = 'block';

            infoPanel.innerHTML = `Componente: <span class="highlight-text">${nombreParaMostrar}</span>`;
            }
            });

        // Limpiamos cuando sale del componente
        svg.addEventListener('mouseout', () => {
            tooltip.style.display = 'none'; 
            infoPanel.textContent = "SITÚA EL MOUSE SOBRE UN PIN";
        });
    </script>
